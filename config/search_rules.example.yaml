version: 1
groups:
  - id: direct
    label: "기관 직접"
    enabled: true
    query: '("한국전기안전공사" OR "전기안전공사" OR "KESCO")'

  - id: safety
    label: "전기화재·감전"
    enabled: true
    query: '("전기화재" OR "전기 화재" OR "감전사고" OR "감전 사고")'

  - id: policy
    label: "기후·에너지 정책"
    enabled: true
    query: '"기후에너지환경부" (에너지 OR 전기)'

  - id: management
    label: "경영·감사"
    enabled: true
    query: '("한국전기안전공사" OR "전기안전공사") (사장 OR 감사 OR 국정감사 OR 경영평가 OR 인사)'

  - id: community
    label: "지역·상생"
    enabled: true
    query: '("한국전기안전공사" OR "전기안전공사") (협약 OR 봉사 OR 지원 OR 캠페인 OR 지역)'

  - id: industry
    label: "산업 동향"
    enabled: true
    query: '("재생에너지" OR "신재생에너지" OR "ESS" OR "전기차 충전시설")'

exclude_terms:
  - "채용공고"
